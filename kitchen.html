<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punto Burger — Panel de cocina</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600;700&display=swap');
:root{
  --ink:#211E1A; --bg:#1B1A17; --cream:#F6F1E7; --paper:#FBF8F2;
  --brand:#D6401F; --amber:#F0A202; --green:#3A7D5C; --line:#E4DCCB; --muted:#8A8477;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg); font-family:'Work Sans',sans-serif; color:var(--ink); min-height:100vh;}
.app{max-width:1100px; margin:0 auto; min-height:100vh; background:var(--cream);}
.header{
  background:var(--ink); color:var(--cream); padding:16px 24px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:6px solid var(--brand);
}
.logo{font-family:'Anton',sans-serif; font-size:22px;}
.logo span{color:var(--amber);}
.logout-btn{background:none; border:1px solid var(--cream); color:var(--cream); padding:7px 14px; border-radius:8px; font-size:12.5px; cursor:pointer;}

/* LOGIN */
.login-wrap{display:flex; align-items:center; justify-content:center; min-height:80vh; padding:20px;}
.login-card{background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:28px; width:100%; max-width:340px;}
.login-card h2{font-family:'Anton',sans-serif; font-size:20px; margin:0 0 4px 0;}
.login-card p{font-size:12.5px; color:var(--muted); margin:0 0 18px 0;}
.login-card input{
  width:100%; padding:11px 12px; border-radius:8px; border:1px solid var(--line);
  font-family:'Work Sans'; font-size:13.5px; margin-bottom:10px;
}
.login-btn{
  width:100%; background:var(--brand); color:var(--cream); border:none; padding:12px;
  border-radius:8px; font-weight:700; font-size:14px; cursor:pointer; margin-top:4px;
}
.login-error{color:var(--brand); font-size:12px; margin-top:6px;}
.config-warning{
  background:#fff3e0; border:1px solid var(--amber); border-radius:10px; padding:14px;
  font-size:12.5px; margin:20px; line-height:1.5;
}

/* ORDER LIST */
.toolbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 22px 0 22px;
}
.filter-row{display:flex; gap:8px;}
.filter-btn{
  font-size:12.5px; font-weight:600; padding:7px 14px; border-radius:20px;
  border:2px solid var(--ink); background:transparent; cursor:pointer;
}
.filter-btn.active{background:var(--ink); color:var(--amber);}
.order-count{font-family:'Space Mono',monospace; font-size:12px; color:var(--muted);}
.order-grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:14px; padding:16px 22px 40px 22px;
}
.order-card{
  background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:16px;
  display:flex; flex-direction:column; gap:10px;
}
.order-card.recibido{border-left:5px solid var(--muted);}
.order-card.preparando{border-left:5px solid var(--amber);}
.order-card.listo, .order-card.en_camino{border-left:5px solid #3E82C9;}
.order-card.entregado{border-left:5px solid var(--green); opacity:0.7;}
.order-top{display:flex; justify-content:space-between; align-items:flex-start;}
.order-num{font-family:'Space Mono',monospace; font-weight:700; font-size:20px;}
.order-type-badge{font-size:11.5px; font-weight:700; padding:4px 9px; border-radius:6px; background:var(--cream); border:1px solid var(--line); white-space:nowrap;}
.order-time{font-size:11px; color:var(--muted); font-family:'Space Mono',monospace;}
.order-address{font-size:12px; color:var(--muted); line-height:1.4;}
.order-items{font-size:13px; line-height:1.5; border-top:1px dashed var(--line); border-bottom:1px dashed var(--line); padding:8px 0;}
.order-items div{display:flex; justify-content:space-between; gap:8px;}
.order-item-extras{font-size:11px; color:var(--muted);}
.order-footer{display:flex; justify-content:space-between; align-items:center;}
.order-total{font-family:'Space Mono',monospace; font-weight:700; font-size:15px;}
.order-payment{font-size:11.5px; color:var(--muted);}
.status-pill{
  font-size:11.5px; font-weight:700; padding:5px 11px; border-radius:20px; text-transform:uppercase;
  letter-spacing:0.4px; background:var(--ink); color:var(--amber); width:fit-content;
}
.advance-btn{
  background:var(--ink); color:var(--cream); border:none; padding:11px; border-radius:8px;
  font-weight:700; font-size:13.5px; cursor:pointer;
}
.advance-btn:hover{background:var(--brand);}
.advance-btn:disabled{background:var(--green); cursor:default; opacity:0.8;}
.empty-state{padding:60px 20px; text-align:center; color:var(--muted); font-size:14px;}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
const supabaseReady = window.SUPABASE_URL && window.SUPABASE_ANON_KEY
  && !window.SUPABASE_URL.includes("TU-PROYECTO")
  && !window.SUPABASE_ANON_KEY.includes("TU-LLAVE");
const sb = supabaseReady ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY) : null;

const STATUS_FLOW = {
  retiro: ["recibido","preparando","listo"],
  delivery: ["recibido","preparando","en_camino","entregado"]
};
const STATUS_LABELS = {
  recibido:"Recibido", preparando:"Preparando", listo:"Listo para retirar",
  en_camino:"En camino", entregado:"Entregado"
};

let state = { session: null, loginError: "", orders: [], filter: "activos", channel: null, loadError: "" };

function formatCLP(n){ return "$" + Math.round(n).toLocaleString("es-CL"); }
function formatTime(iso){
  const d = new Date(iso);
  return d.toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"});
}
function isTerminal(order){
  const flow = STATUS_FLOW[order.order_type];
  return order.status === flow[flow.length-1];
}

function render(){
  const app = document.getElementById("app");
  if(!supabaseReady){
    app.innerHTML = `
      <div class="header"><div class="logo">PUNTO<span>BURGER</span> · Cocina</div></div>
      <div class="config-warning">
        Este panel necesita que <b>supabase-config.js</b> tenga tu URL y llave anon reales de Supabase.
        Revisa ese archivo y sigue las instrucciones que trae adentro.
      </div>
    `;
    return;
  }
  if(!state.session){
    app.innerHTML = renderLogin();
  } else {
    app.innerHTML = renderDashboard();
  }
  attachEvents();
}

function renderLogin(){
  return `
    <div class="header"><div class="logo">PUNTO<span>BURGER</span> · Cocina</div></div>
    <div class="login-wrap">
      <div class="login-card">
        <h2>Ingreso staff</h2>
        <p>Usa el correo y contraseña que creaste para el equipo en Supabase Auth.</p>
        <input type="email" id="loginEmail" placeholder="correo@puntoburger.cl">
        <input type="password" id="loginPassword" placeholder="Contraseña">
        <button class="login-btn" id="loginBtn">Ingresar</button>
        ${state.loginError ? `<p class="login-error">${state.loginError}</p>` : ""}
      </div>
    </div>
  `;
}

function renderDashboard(){
  const visibleOrders = state.filter === "activos"
    ? state.orders.filter(o => !isTerminal(o))
    : state.orders;

  const cardsHtml = visibleOrders.length === 0
    ? `<div class="empty-state">No hay pedidos ${state.filter === "activos" ? "activos" : ""} por ahora.</div>`
    : visibleOrders.map(renderOrderCard).join("");

  return `
    <div class="header">
      <div class="logo">PUNTO<span>BURGER</span> · Cocina</div>
      <button class="logout-btn" id="logoutBtn">Cerrar sesión</button>
    </div>
    <div class="toolbar">
      <div class="filter-row">
        <button class="filter-btn ${state.filter==='activos'?'active':''}" data-filter="activos">Activos</button>
        <button class="filter-btn ${state.filter==='todos'?'active':''}" data-filter="todos">Todos</button>
      </div>
      <span class="order-count">${visibleOrders.length} pedido(s)</span>
    </div>
    ${state.loadError ? `<div class="config-warning" style="margin:16px 22px;">No se pudo actualizar la lista: ${state.loadError}</div>` : ""}
    <div class="order-grid">${cardsHtml}</div>
  `;
}

function renderOrderCard(order){
  const flow = STATUS_FLOW[order.order_type];
  const idx = flow.indexOf(order.status);
  const nextStatus = idx < flow.length - 1 ? flow[idx+1] : null;
  const items = (order.order_items || []).map(it => `
    <div>
      <span>${it.qty}× ${it.item_name}${it.extras ? `<span class="order-item-extras"><br>${it.extras}</span>` : ""}</span>
      <span>${formatCLP(it.unit_price * it.qty)}</span>
    </div>
  `).join("");

  return `
    <div class="order-card ${order.status}">
      <div class="order-top">
        <div>
          <div class="order-num">N° ${order.order_number}</div>
          <div class="order-time">${formatTime(order.created_at)}</div>
        </div>
        <span class="order-type-badge">${order.order_type === 'delivery' ? '🛵 Delivery' : '🏬 Retiro'}</span>
      </div>
      ${order.order_type === 'delivery' ? `<div class="order-address">📍 ${order.delivery_address || ''}</div>` : ""}
      <div class="order-items">${items}</div>
      <div class="order-footer">
        <span class="order-total">${formatCLP(order.total)}</span>
        <span class="order-payment">${order.payment_method === 'efectivo' ? '💵 Efectivo' : order.payment_method === 'tarjeta' ? '💳 Tarjeta' : '📱 Online'}</span>
      </div>
      <span class="status-pill">${STATUS_LABELS[order.status]}</span>
      <button class="advance-btn" data-advance="${order.id}" data-next="${nextStatus||''}" ${nextStatus?"":"disabled"}>
        ${nextStatus ? "Marcar: " + STATUS_LABELS[nextStatus] : "Completado"}
      </button>
    </div>
  `;
}

function attachEvents(){
  const loginBtn = document.getElementById("loginBtn");
  if(loginBtn){
    loginBtn.addEventListener("click", async ()=>{
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      loginBtn.disabled = true; loginBtn.textContent = "Ingresando…";
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if(error){
        state.loginError = "No se pudo ingresar: " + error.message;
        render();
        return;
      }
      state.session = data.session;
      state.loginError = "";
      await loadOrders();
      subscribeRealtime();
      render();
    });
  }

  const logoutBtn = document.getElementById("logoutBtn");
  if(logoutBtn){
    logoutBtn.addEventListener("click", async ()=>{
      if(state.channel) sb.removeChannel(state.channel);
      await sb.auth.signOut();
      state.session = null;
      state.orders = [];
      render();
    });
  }

  document.querySelectorAll("[data-filter]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      state.filter = btn.getAttribute("data-filter");
      render();
    });
  });

  document.querySelectorAll("[data-advance]").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const orderId = btn.getAttribute("data-advance");
      const nextStatus = btn.getAttribute("data-next");
      if(!nextStatus) return;
      btn.disabled = true; btn.textContent = "Actualizando…";
      const { error } = await sb.from("orders").update({ status: nextStatus }).eq("id", orderId);
      if(error){
        alert("No se pudo actualizar: " + error.message);
        render();
        return;
      }
      // La lista se refresca sola por la suscripción realtime,
      // pero actualizamos localmente por si acaso hay demora en la señal.
      const order = state.orders.find(o=>o.id===orderId);
      if(order) order.status = nextStatus;
      render();
    });
  });
}

async function loadOrders(){
  const { data, error } = await sb
    .from("orders")
    .select("*, order_items(*)")
    .order("created_at", { ascending: false });
  if(error){
    state.loadError = error.message;
    if(error.code === "PGRST301" || /JWT/i.test(error.message)){
      state.session = null; // el token venció: manda de vuelta al login
    }
  } else {
    state.orders = data;
    state.loadError = "";
  }
}

function subscribeRealtime(){
  state.channel = sb.channel("kitchen-orders")
    .on("postgres_changes", { event: "*", schema: "public", table: "orders" }, async ()=>{
      await loadOrders();
      render();
    })
    .subscribe();
}

// Restaura la sesión si el staff ya había iniciado sesión antes
(async function init(){
  if(!supabaseReady){ render(); return; }
  const { data } = await sb.auth.getSession();
  if(data.session){
    state.session = data.session;
    await loadOrders();
    subscribeRealtime();
  }
  render();
})();
</script>
</body>
</html>
