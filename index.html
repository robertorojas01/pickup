<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Punto Burger — Pide y retira</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B1A17">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Punto Burger">
<meta name="description" content="Pide en Punto Burger y elige retiro en local o delivery, con seguimiento de tu pedido en tiempo real.">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600;700&display=swap');

:root{
  --ink:#211E1A;
  --bg:#1B1A17;
  --cream:#F6F1E7;
  --paper:#FBF8F2;
  --brand:#D6401F;
  --brand-dark:#A6300F;
  --amber:#F0A202;
  --green:#3A7D5C;
  --green-dark:#255C40;
  --line:#E4DCCB;
  --muted:#8A8477;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0; overflow-x:hidden;}
body{
  background:var(--bg);
  font-family:'Work Sans',sans-serif;
  color:var(--ink);
  min-height:100vh;
}
.app{
  max-width:1180px;
  margin:0 auto;
  min-height:100vh;
  background:var(--cream);
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  background:var(--ink);
  color:var(--cream);
  padding:18px 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:6px solid var(--brand);
  flex-wrap:wrap;
  gap:8px;
  overflow:hidden;
}
.logo{
  font-family:'Anton',sans-serif;
  font-size:28px;
  letter-spacing:0.5px;
  color:var(--cream);
  display:flex;
  align-items:baseline;
  gap:8px;
}
.logo span{color:var(--amber);}
.store-info{
  font-family:'Space Mono',monospace;
  font-size:12px;
  color:#C9C4B6;
  text-align:right;
  line-height:1.5;
  min-width:0;
  max-width:100%;
}
.cart-pill{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--brand);
  color:var(--cream);
  padding:9px 16px;
  border-radius:30px;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  border:none;
  white-space:nowrap;
}
.cart-pill:active{transform:scale(0.97);}
.header-right{display:flex; align-items:center; gap:18px; min-width:0; flex-wrap:wrap; justify-content:flex-end;}
.demo-badge{
  font-family:'Space Mono',monospace;
  font-size:10.5px;
  font-weight:700;
  letter-spacing:0.5px;
  background:var(--amber);
  color:var(--ink);
  padding:4px 9px;
  border-radius:6px;
  white-space:nowrap;
}

/* MAIN LAYOUT */
.main{
  flex:1;
  display:grid;
  grid-template-columns:1fr 340px;
  gap:0;
  min-width:0;
}
.content-col{
  min-width:0;
}
@media (max-width:860px){
  .main{grid-template-columns:1fr;}
  .menu-area{padding-bottom:90px;}
  .grid{grid-template-columns:1fr !important;}
  .ticket-panel{
    position:fixed;
    left:0; right:0; bottom:0;
    max-height:82vh;
    border-left:none;
    border-top:1px solid var(--line);
    border-radius:18px 18px 0 0;
    box-shadow:0 -6px 24px rgba(27,26,23,0.25);
    transform:translateY(100%);
    transition:transform 0.25s ease;
    z-index:40;
  }
  .ticket-panel.sheet-open{transform:translateY(0);}
  .sheet-handle{
    display:block;
    width:40px; height:4px;
    background:var(--line);
    border-radius:4px;
    margin:0 auto 12px auto;
  }
  .sheet-close{
    position:absolute; top:14px; right:16px;
    background:none; border:none; font-size:20px; color:var(--muted); cursor:pointer;
  }
  .mobile-cart-bar{
    display:flex;
    position:fixed;
    left:12px; right:12px;
    bottom:calc(14px + env(safe-area-inset-bottom));
    background:var(--brand);
    color:var(--cream);
    border-radius:14px;
    padding:13px 18px;
    align-items:center;
    justify-content:space-between;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
    z-index:35;
    border:none;
  }
  .mobile-cart-bar span.mcb-total{font-family:'Space Mono',monospace;}
  .sheet-backdrop{
    display:block;
    position:fixed; inset:0;
    background:rgba(27,26,23,0.5);
    z-index:38;
  }
}
@media (min-width:861px){
  .mobile-cart-bar, .sheet-backdrop, .sheet-handle, .sheet-close{display:none;}
}

/* CATEGORY NAV */
.cat-nav{
  display:flex;
  gap:8px;
  padding:18px 24px 0 24px;
  overflow-x:auto;
}
.cat-btn{
  font-family:'Work Sans',sans-serif;
  font-weight:600;
  font-size:13.5px;
  padding:9px 18px;
  border-radius:24px;
  border:2px solid var(--ink);
  background:transparent;
  color:var(--ink);
  cursor:pointer;
  white-space:nowrap;
  flex-shrink:0;
}
.cat-btn.active{
  background:var(--ink);
  color:var(--amber);
}

/* MENU GRID */
.menu-area{padding:16px 24px 40px 24px;}
.menu-section-title{
  font-family:'Anton',sans-serif;
  font-size:22px;
  margin:22px 0 12px 0;
  color:var(--ink);
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:14px;
}
.item-card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:8px;
  position:relative;
}
.item-card .combo-num{
  position:absolute;
  top:-10px;
  left:-10px;
  background:var(--amber);
  color:var(--ink);
  font-family:'Space Mono',monospace;
  font-weight:700;
  font-size:13px;
  width:30px;
  height:30px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid var(--paper);
}
.item-emoji{font-size:38px; line-height:1;}
.item-name{font-weight:600; font-size:15px; margin:0;}
.item-desc{font-size:12.5px; color:var(--muted); margin:0; line-height:1.4; min-height:32px;}
.item-footer{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:auto;
}
.item-price{
  font-family:'Space Mono',monospace;
  font-weight:700;
  font-size:15px;
}
.add-btn{
  background:var(--ink);
  color:var(--cream);
  border:none;
  border-radius:8px;
  padding:8px 14px;
  font-weight:600;
  font-size:13px;
  cursor:pointer;
}
.add-btn:hover{background:var(--brand);}
.add-btn:active{transform:scale(0.96);}

/* TICKET / CART PANEL */
.ticket-panel{
  background:var(--paper);
  border-left:1px solid var(--line);
  display:flex;
  flex-direction:column;
  padding:20px;
  min-height:100%;
}
.ticket-title{
  font-family:'Anton',sans-serif;
  font-size:19px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:0 0 4px 0;
}
.ticket-sub{font-size:12px; color:var(--muted); margin:0 0 14px 0;}
.ticket-items{
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.empty-cart{
  color:var(--muted);
  font-size:13.5px;
  text-align:center;
  padding:40px 10px;
  border:1px dashed var(--line);
  border-radius:10px;
}
.cart-line{
  border-bottom:1px dashed var(--line);
  padding-bottom:10px;
}
.cart-line-top{display:flex; justify-content:space-between; gap:8px;}
.cart-line-name{font-weight:600; font-size:13.5px;}
.cart-line-extras{font-size:11.5px; color:var(--muted); margin:2px 0 0 0;}
.cart-line-price{font-family:'Space Mono',monospace; font-size:13px; font-weight:700; white-space:nowrap;}
.cart-line-controls{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:8px;
}
.qty-ctrl{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--cream);
  border-radius:20px;
  padding:2px 4px;
}
.qty-ctrl button{
  width:22px; height:22px;
  border-radius:50%;
  border:none;
  background:var(--ink);
  color:var(--cream);
  font-weight:700;
  cursor:pointer;
  font-size:13px;
  line-height:1;
}
.qty-ctrl span{font-family:'Space Mono',monospace; font-size:13px; min-width:14px; text-align:center;}
.remove-link{
  background:none; border:none; color:var(--brand); font-size:11.5px; font-weight:600; cursor:pointer; text-decoration:underline;
}
.ticket-totals{
  border-top:2px solid var(--ink);
  margin-top:14px;
  padding-top:12px;
  font-family:'Space Mono',monospace;
  font-size:13px;
}
.totals-row{display:flex; justify-content:space-between; margin-bottom:4px;}
.totals-row.grand{font-size:17px; font-weight:700; margin-top:6px;}
.confirm-btn{
  margin-top:14px;
  background:var(--brand);
  color:var(--cream);
  border:none;
  padding:14px;
  border-radius:10px;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  width:100%;
}
.confirm-btn:disabled{background:var(--muted); cursor:not-allowed;}
.confirm-btn:not(:disabled):active{transform:scale(0.98);}
.pickup-note{
  font-size:11px; color:var(--muted); text-align:center; margin-top:8px;
}

/* CHECKOUT: DELIVERY / PAYMENT */
.checkout-section{
  margin-top:14px;
  padding-top:14px;
  border-top:1px dashed var(--line);
}
.checkout-label{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.5px;
  color:var(--muted);
  margin-bottom:8px;
}
.toggle-row{display:flex; gap:8px; margin-bottom:4px;}
.toggle-btn{
  flex:1;
  padding:9px 6px;
  border-radius:8px;
  border:2px solid var(--ink);
  background:transparent;
  color:var(--ink);
  font-weight:600;
  font-size:12.5px;
  cursor:pointer;
  text-align:center;
}
.toggle-btn.active{background:var(--ink); color:var(--amber);}
.address-input{
  width:100%;
  margin-top:10px;
  padding:9px 10px;
  border-radius:8px;
  border:1px solid var(--line);
  font-family:'Work Sans',sans-serif;
  font-size:13px;
  min-height:48px;
  resize:vertical;
}
.pay-options{display:flex; flex-direction:column; gap:6px;}
.pay-option{
  display:flex;
  align-items:center;
  gap:9px;
  padding:9px 10px;
  border:1px solid var(--line);
  border-radius:8px;
  font-size:13px;
  cursor:pointer;
}
.pay-option.active{border-color:var(--ink); background:var(--cream);}
.pay-option input{accent-color:var(--brand);}
.delivery-address-recap{
  font-size:12px; color:var(--muted); max-width:340px; line-height:1.5; margin-top:2px;
}

/* MODAL */
.modal-overlay{
  position:fixed; inset:0; background:rgba(27,26,23,0.6);
  display:flex; align-items:center; justify-content:center;
  z-index:50; padding:16px;
}
.modal{
  background:var(--paper);
  border-radius:16px;
  width:100%; max-width:420px;
  max-height:88vh;
  overflow-y:auto;
  padding:22px;
}
.modal-header{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
.modal-header h3{font-family:'Anton',sans-serif; font-size:20px; margin:0;}
.modal-close{background:none; border:none; font-size:22px; cursor:pointer; color:var(--muted); line-height:1;}
.modal-desc{font-size:13px; color:var(--muted); margin:6px 0 16px 0;}
.option-group{margin-bottom:16px;}
.option-group-title{font-size:12.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink); margin-bottom:8px;}
.option-row{
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 0; border-bottom:1px solid var(--line);
  font-size:13.5px;
}
.option-row label{display:flex; align-items:center; gap:10px; cursor:pointer; width:100%; justify-content:space-between;}
.option-extra{color:var(--muted); font-family:'Space Mono',monospace; font-size:12px;}
.modal-qty{display:flex; align-items:center; gap:14px; margin:16px 0;}
.modal-add-btn{
  width:100%; background:var(--ink); color:var(--cream); border:none; padding:14px;
  border-radius:10px; font-weight:700; font-size:15px; cursor:pointer;
  display:flex; justify-content:space-between; align-items:center; padding-left:18px; padding-right:18px;
}
.modal-add-btn:active{transform:scale(0.98);}

/* TICKET / PICKUP SCREEN */
.pickup-screen{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  text-align:center;
  gap:6px;
}
.pickup-label{font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); font-weight:600;}
.pickup-number{
  font-family:'Space Mono',monospace;
  font-weight:700;
  font-size:96px;
  color:var(--ink);
  background:var(--paper);
  border:3px solid var(--ink);
  border-radius:20px;
  padding:10px 50px;
  margin:10px 0 22px 0;
  letter-spacing:4px;
}
.status-track{
  display:flex;
  align-items:center;
  gap:0;
  margin:10px 0 26px 0;
}
.status-step{
  display:flex; flex-direction:column; align-items:center; gap:8px; width:120px;
}
.status-dot{
  width:34px; height:34px; border-radius:50%;
  background:var(--line); color:var(--muted);
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:15px;
  border:2px solid var(--line);
}
.status-dot.done{background:var(--green); border-color:var(--green); color:#fff;}
.status-dot.current{background:var(--amber); border-color:var(--amber); color:var(--ink); animation:pulse 1.4s infinite;}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(240,162,2,0.5);}
  70%{box-shadow:0 0 0 10px rgba(240,162,2,0);}
  100%{box-shadow:0 0 0 0 rgba(240,162,2,0);}
}
.status-label{font-size:12px; font-weight:600; color:var(--ink);}
.status-line{height:2px; width:40px; background:var(--line); margin-bottom:34px;}
.status-line.done{background:var(--green);}
.pickup-msg{
  font-size:15px; font-weight:600; max-width:360px; line-height:1.5;
}
.pickup-sub{font-size:13px; color:var(--muted); max-width:340px; line-height:1.5;}
.new-order-btn{
  margin-top:26px;
  background:var(--ink); color:var(--cream); border:none;
  padding:13px 26px; border-radius:10px; font-weight:700; font-size:14px; cursor:pointer;
}
.new-order-btn:active{transform:scale(0.97);}
.pickup-station{
  font-family:'Space Mono',monospace; font-size:12px; color:var(--muted); margin-top:4px;
}

@media (max-width:520px){
  .pickup-number{font-size:56px; padding:8px 28px;}
  .status-step{width:88px;}
  .status-line{width:20px;}
  .header{padding:14px 16px;}
  .logo{font-size:21px;}
  .store-info{font-size:10.5px;}
}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
const supabaseReady = window.SUPABASE_URL && window.SUPABASE_ANON_KEY
  && !window.SUPABASE_URL.includes("TU-PROYECTO")
  && !window.SUPABASE_ANON_KEY.includes("TU-LLAVE");
const sb = supabaseReady
  ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY)
  : null;
const MENU = {
  combos: {
    title: "Combos",
    items: [
      {id:"c1", num:1, emoji:"🍔", name:"Combo Clásica", desc:"Hamburguesa clásica + papas + bebida", price:4990},
      {id:"c2", num:2, emoji:"🧀", name:"Combo Doble Queso", desc:"Doble carne, doble queso + papas + bebida", price:5990},
      {id:"c3", num:3, emoji:"🍗", name:"Combo Chicken Crunch", desc:"Pollo crocante + papas + bebida", price:5490},
      {id:"c4", num:4, emoji:"🥬", name:"Combo Veggie", desc:"Hamburguesa vegetal + papas + bebida", price:5290},
      {id:"c5", num:5, emoji:"🥓", name:"Combo Bacon BBQ", desc:"Carne, tocino y salsa BBQ + papas + bebida", price:6490},
      {id:"c6", num:6, emoji:"🧒", name:"Combo Kids", desc:"Mini hamburguesa + papas chicas + jugo", price:3490}
    ],
    burgerExtras:true
  },
  hamburguesas: {
    title: "Hamburguesas",
    items: [
      {id:"h1", emoji:"🍔", name:"Clásica", desc:"Carne, queso, lechuga, tomate y salsas", price:3490},
      {id:"h2", emoji:"🧀", name:"Doble Queso", desc:"Doble carne y doble queso cheddar", price:4490},
      {id:"h3", emoji:"🍗", name:"Chicken Crunch", desc:"Pollo crocante, lechuga y mayo", price:3990},
      {id:"h4", emoji:"🥬", name:"Veggie", desc:"Hamburguesa vegetal con palta", price:3790},
      {id:"h5", emoji:"🥓", name:"Bacon BBQ", desc:"Carne, tocino, cebolla caramelizada y BBQ", price:4990}
    ],
    burgerExtras:true
  },
  papas: {
    title: "Papas y acompañamientos",
    items: [
      {id:"p1", emoji:"🍟", name:"Papas fritas chica", desc:"Porción individual", price:1490, sizeOptions:true},
      {id:"p2", emoji:"🍟", name:"Papas fritas grande", desc:"Para compartir", price:2190},
      {id:"p3", emoji:"🧀", name:"Papas con queso", desc:"Bañadas en salsa cheddar", price:2790},
      {id:"p4", emoji:"🧅", name:"Aros de cebolla", desc:"6 unidades crocantes", price:2390},
      {id:"p5", emoji:"🍗", name:"Nuggets (6u)", desc:"Con salsa a elección", price:2990}
    ]
  },
  bebidas: {
    title: "Bebidas",
    items: [
      {id:"b1", emoji:"🥤", name:"Bebida chica", desc:"A elección", price:990, drinkFlavor:true},
      {id:"b2", emoji:"🥤", name:"Bebida grande", desc:"A elección", price:1490, drinkFlavor:true},
      {id:"b3", emoji:"🧃", name:"Jugo natural", desc:"Naranja o frutilla", price:1690},
      {id:"b4", emoji:"💧", name:"Agua mineral", desc:"Con o sin gas", price:990},
      {id:"b5", emoji:"🥤", name:"Milkshake", desc:"Vainilla, chocolate o frutilla", price:2490}
    ]
  },
  postres: {
    title: "Postres",
    items: [
      {id:"d1", emoji:"🍨", name:"Sundae chocolate", desc:"Helado con salsa de chocolate", price:1690},
      {id:"d2", emoji:"🥧", name:"Apple pie", desc:"Tarta de manzana caliente", price:1590},
      {id:"d3", emoji:"🍦", name:"Cono vainilla", desc:"Clásico cono suave", price:890},
      {id:"d4", emoji:"🍫", name:"Brownie", desc:"Con nuez y chips de chocolate", price:1890}
    ]
  }
};

const BURGER_EXTRAS = [
  {id:"sinCebolla", label:"Sin cebolla", price:0},
  {id:"sinPepinillo", label:"Sin pepinillo", price:0},
  {id:"sinSalsa", label:"Sin salsa", price:0},
  {id:"quesoExtra", label:"Queso extra", price:500},
  {id:"tocinoExtra", label:"Tocino extra", price:700}
];
const DRINK_FLAVORS = ["Cola","Cola sin azúcar","Naranja","Lima limón"];
const PAYMENT_METHODS = [
  {id:"efectivo", emoji:"💵", label:"Efectivo"},
  {id:"tarjeta", emoji:"💳", label:"Tarjeta débito / crédito"},
  {id:"online", emoji:"📱", label:"Pago en línea"}
];
const DELIVERY_FEE = 1990;

function formatCLP(n){
  return "$" + Math.round(n).toLocaleString("es-CL");
}

let state = {
  view: "menu",
  category: "combos",
  cart: [],
  modalItem: null,
  sheetOpen: false,
  orderType: "retiro",
  paymentMethod: null,
  deliveryAddress: "",
  orderNumber: null,
  orderId: null,
  statusStep: 0,
  statusTimers: [],
  realtimeChannel: null
};
let cartIdCounter = 1;

function render(){
  const app = document.getElementById("app");
  if(state.view === "menu"){
    app.innerHTML = renderMenuView();
  } else {
    app.innerHTML = renderPickupView();
  }
  attachEvents();
}

function cartTotalCount(){
  return state.cart.reduce((s,l)=>s+l.qty,0);
}
function cartSubtotal(){
  return state.cart.reduce((s,l)=>s + l.unitPrice*l.qty, 0);
}
function cartDeliveryFee(){
  return state.orderType === "delivery" ? DELIVERY_FEE : 0;
}
function cartGrandTotal(){
  return cartSubtotal() + cartDeliveryFee();
}
function canConfirmOrder(){
  if(state.cart.length === 0) return false;
  if(!state.paymentMethod) return false;
  if(state.orderType === "delivery" && state.deliveryAddress.trim().length === 0) return false;
  return true;
}

function renderMenuView(){
  const cats = Object.keys(MENU);
  const catButtons = cats.map(k => `<button class="cat-btn ${state.category===k?'active':''}" data-cat="${k}">${MENU[k].title}</button>`).join("");
  const section = MENU[state.category];
  const cardsHtml = section.items.map(item => renderItemCard(item)).join("");

  const cartHtml = state.cart.length === 0
    ? `<div class="empty-cart">Tu ticket está vacío.<br>Agrega productos del menú para empezar tu pedido.</div>`
    : state.cart.map(line => renderCartLine(line)).join("");

  const subtotal = cartSubtotal();
  const deliveryFee = cartDeliveryFee();
  const total = cartGrandTotal();
  const confirmEnabled = canConfirmOrder();

  const orderTypeHtml = `
    <div class="checkout-section">
      <div class="checkout-label">Tipo de entrega</div>
      <div class="toggle-row">
        <button class="toggle-btn ${state.orderType==='retiro'?'active':''}" data-ordertype="retiro">🏬 Retiro en local</button>
        <button class="toggle-btn ${state.orderType==='delivery'?'active':''}" data-ordertype="delivery">🛵 Delivery</button>
      </div>
      ${state.orderType==='delivery' ? `<textarea class="address-input" id="deliveryAddressInput" placeholder="Calle, número, comuna, referencia">${state.deliveryAddress}</textarea>` : ""}
    </div>
  `;

  const paymentHtml = `
    <div class="checkout-section">
      <div class="checkout-label">Medio de pago</div>
      <div class="pay-options">
        ${PAYMENT_METHODS.map(pm => `
          <label class="pay-option ${state.paymentMethod===pm.id?'active':''}">
            <input type="radio" name="paymentMethod" data-payment="${pm.id}" ${state.paymentMethod===pm.id?'checked':''}>
            <span>${pm.emoji} ${pm.label}</span>
          </label>
        `).join("")}
      </div>
    </div>
  `;

  const noteText = state.orderType === "delivery"
    ? "Al confirmar, tu pedido sale a reparto a la dirección indicada."
    : "Al confirmar, recibes un número para retirar tu pedido en el mostrador.";

  return `
    <div class="header">
      <div class="logo">PUNTO<span>BURGER</span></div>
      <div class="header-right">
        <div class="store-info">PIDE AQUÍ · RETIRA O PIDE DELIVERY<br>Tiempo estimado: 8–12 min</div>
        ${!supabaseReady ? '<span class="demo-badge">MODO DEMO</span>' : ""}
      </div>
    </div>
    <div class="main">
      <div class="content-col">
        <div class="cat-nav">${catButtons}</div>
        <div class="menu-area">
          <h2 class="menu-section-title">${section.title}</h2>
          <div class="grid">${cardsHtml}</div>
        </div>
      </div>
      ${state.sheetOpen ? '<div class="sheet-backdrop" id="sheetBackdrop"></div>' : ""}
      <div class="ticket-panel ${state.sheetOpen ? 'sheet-open' : ''}">
        <span class="sheet-handle"></span>
        <button class="sheet-close" id="sheetCloseBtn">✕</button>
        <h3 class="ticket-title">Tu ticket <span style="font-family:'Space Mono',monospace;font-size:13px;">${cartTotalCount()} u.</span></h3>
        <p class="ticket-sub">Elige retiro en local o delivery</p>
        <div class="ticket-items">${cartHtml}</div>
        ${orderTypeHtml}
        ${paymentHtml}
        <div class="ticket-totals">
          <div class="totals-row"><span>Subtotal</span><span>${formatCLP(subtotal)}</span></div>
          ${state.orderType==='delivery' ? `<div class="totals-row"><span>Delivery</span><span>${formatCLP(deliveryFee)}</span></div>` : ""}
          <div class="totals-row grand"><span>Total</span><span>${formatCLP(total)}</span></div>
        </div>
        <button class="confirm-btn" id="confirmBtn" ${confirmEnabled?"":"disabled"}>Confirmar pedido</button>
        <p class="pickup-note" id="pickupNote">${noteText}</p>
      </div>
    </div>
    ${state.cart.length > 0 ? `
    <button class="mobile-cart-bar" id="mobileCartBar">
      <span>🧾 Ver ticket · ${cartTotalCount()} u.</span>
      <span class="mcb-total">${formatCLP(total)}</span>
    </button>` : ""}
    ${state.modalItem ? renderModal(state.modalItem) : ""}
  `;
}

function renderItemCard(item){
  return `
    <div class="item-card">
      ${item.num ? `<div class="combo-num">${item.num}</div>` : ""}
      <div class="item-emoji">${item.emoji}</div>
      <p class="item-name">${item.name}</p>
      <p class="item-desc">${item.desc}</p>
      <div class="item-footer">
        <span class="item-price">${formatCLP(item.price)}</span>
        <button class="add-btn" data-item="${item.id}">Agregar</button>
      </div>
    </div>
  `;
}

function renderCartLine(line){
  const extrasText = line.extrasLabels.length ? line.extrasLabels.join(" · ") : "";
  return `
    <div class="cart-line">
      <div class="cart-line-top">
        <span class="cart-line-name">${line.name}</span>
        <span class="cart-line-price">${formatCLP(line.unitPrice*line.qty)}</span>
      </div>
      ${extrasText ? `<p class="cart-line-extras">${extrasText}</p>` : ""}
      <div class="cart-line-controls">
        <div class="qty-ctrl">
          <button data-qty="dec" data-line="${line.cartId}">−</button>
          <span>${line.qty}</span>
          <button data-qty="inc" data-line="${line.cartId}">+</button>
        </div>
        <button class="remove-link" data-remove="${line.cartId}">Quitar</button>
      </div>
    </div>
  `;
}

function renderModal(itemId){
  let found = null;
  for(const key in MENU){
    const f = MENU[key].items.find(i=>i.id===itemId);
    if(f){found = f; found._section = key; break;}
  }
  if(!found) return "";
  const section = MENU[found._section];
  let extrasHtml = "";
  if(section.burgerExtras){
    extrasHtml += `<div class="option-group"><div class="option-group-title">Personaliza tu hamburguesa</div>`;
    extrasHtml += BURGER_EXTRAS.map(ex => `
      <div class="option-row">
        <label><span>${ex.label}</span>
          <span style="display:flex;align-items:center;gap:8px;">
            ${ex.price>0?`<span class="option-extra">+${formatCLP(ex.price)}</span>`:""}
            <input type="checkbox" data-extra="${ex.id}">
          </span>
        </label>
      </div>`).join("");
    extrasHtml += `</div>`;
  }
  if(found.drinkFlavor){
    extrasHtml += `<div class="option-group"><div class="option-group-title">Elige tu sabor</div>`;
    extrasHtml += `<select id="drinkFlavorSelect" style="width:100%;padding:9px;border-radius:8px;border:1px solid var(--line);font-family:'Work Sans';font-size:13.5px;">` +
      DRINK_FLAVORS.map(f=>`<option value="${f}">${f}</option>`).join("") + `</select></div>`;
  }
  return `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-header">
          <div>
            <h3>${found.emoji} ${found.name}</h3>
          </div>
          <button class="modal-close" id="modalCloseBtn">✕</button>
        </div>
        <p class="modal-desc">${found.desc} · ${formatCLP(found.price)}</p>
        ${extrasHtml}
        <div class="modal-qty">
          <span style="font-size:13px;font-weight:600;">Cantidad</span>
          <div class="qty-ctrl">
            <button id="modalQtyDec">−</button>
            <span id="modalQtyVal">1</span>
            <button id="modalQtyInc">+</button>
          </div>
        </div>
        <button class="modal-add-btn" id="modalAddBtn">
          <span>Agregar al ticket</span>
          <span id="modalAddPrice">${formatCLP(found.price)}</span>
        </button>
      </div>
    </div>
  `;
}

function renderPickupView(){
  const isDelivery = state.orderType === "delivery";
  const steps = isDelivery
    ? [{label:"Recibido"},{label:"Preparando"},{label:"En camino"},{label:"Entregado"}]
    : [{label:"Recibido"},{label:"Preparando"},{label:"Listo para retirar"}];

  const stepsHtml = steps.map((s,i)=>{
    let dotClass = "";
    if(i < state.statusStep) dotClass = "done";
    else if(i === state.statusStep) dotClass = "current";
    const icon = i < state.statusStep ? "✓" : (i+1);
    let lineHtml = "";
    if(i < steps.length-1){
      lineHtml = `<div class="status-line ${i < state.statusStep ? 'done':''}"></div>`;
    }
    return `
      <div class="status-step">
        <div class="status-dot ${dotClass}">${icon}</div>
        <span class="status-label">${s.label}</span>
      </div>
      ${lineHtml}
    `;
  }).join("");

  const lastStep = steps.length - 1;
  const isDone = state.statusStep >= lastStep;
  let msg;
  if(isDelivery){
    msg = isDone
      ? "¡Tu pedido fue entregado! Buen provecho."
      : (state.statusStep === 2 ? "Tu repartidor va en camino a tu dirección."
        : (state.statusStep === 1 ? "Estamos preparando tu pedido en cocina." : "Recibimos tu pedido y ya está en cola."));
  } else {
    msg = isDone
      ? "¡Tu pedido está listo! Acércate al mostrador de retiro con tu número."
      : (state.statusStep === 1 ? "Estamos preparando tu pedido en cocina." : "Recibimos tu pedido y ya está en cola.");
  }

  const paymentLabel = PAYMENT_METHODS.find(p=>p.id===state.paymentMethod);
  const subLine = isDelivery
    ? `Pago: ${paymentLabel ? paymentLabel.label : "-"} · Entregaremos en: <span class="delivery-address-recap">${state.deliveryAddress}</span>`
    : `Ten tu número visible al llegar al mostrador. Nuestro equipo lo llamará cuando esté listo. Pago: ${paymentLabel ? paymentLabel.label : "-"}`;

  return `
    <div class="header">
      <div class="logo">PUNTO<span>BURGER</span></div>
      <div class="header-right">
        <div class="store-info">${isDelivery ? "SEGUIMIENTO DE DELIVERY" : "RETIRO EN MOSTRADOR"}</div>
      </div>
    </div>
    <div class="pickup-screen">
      <span class="pickup-label">${isDelivery ? "Tu número de pedido" : "Tu número de retiro"}</span>
      <div class="pickup-number">${state.orderNumber}</div>
      <div class="status-track">${stepsHtml}</div>
      <p class="pickup-msg">${msg}</p>
      <p class="pickup-sub">${subLine}</p>
      <button class="new-order-btn" id="newOrderBtn">Hacer un nuevo pedido</button>
    </div>
  `;
}

function attachEvents(){
  document.querySelectorAll("[data-cat]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      state.category = btn.getAttribute("data-cat");
      render();
    });
  });

  document.querySelectorAll("[data-item]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      state.modalItem = btn.getAttribute("data-item");
      render();
    });
  });

  document.querySelectorAll("[data-qty]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const lineId = btn.getAttribute("data-line");
      const action = btn.getAttribute("data-qty");
      const line = state.cart.find(l=>l.cartId===lineId);
      if(!line) return;
      if(action==="inc") line.qty++;
      else { line.qty--; if(line.qty<=0){ state.cart = state.cart.filter(l=>l.cartId!==lineId); } }
      render();
    });
  });

  document.querySelectorAll("[data-remove]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const lineId = btn.getAttribute("data-remove");
      state.cart = state.cart.filter(l=>l.cartId!==lineId);
      render();
    });
  });

  const confirmBtn = document.getElementById("confirmBtn");
  if(confirmBtn){
    confirmBtn.addEventListener("click", confirmOrder);
  }

  document.querySelectorAll("[data-ordertype]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      state.orderType = btn.getAttribute("data-ordertype");
      render();
    });
  });

  document.querySelectorAll("[data-payment]").forEach(input=>{
    input.addEventListener("change", ()=>{
      state.paymentMethod = input.getAttribute("data-payment");
      render();
    });
  });

  const addressInput = document.getElementById("deliveryAddressInput");
  if(addressInput){
    addressInput.addEventListener("input", ()=>{
      state.deliveryAddress = addressInput.value;
      const btn = document.getElementById("confirmBtn");
      if(btn) btn.disabled = !canConfirmOrder();
    });
  }

  const mobileCartBar = document.getElementById("mobileCartBar");
  if(mobileCartBar){
    mobileCartBar.addEventListener("click", ()=>{
      state.sheetOpen = true;
      render();
    });
  }
  const sheetCloseBtn = document.getElementById("sheetCloseBtn");
  if(sheetCloseBtn){
    sheetCloseBtn.addEventListener("click", ()=>{
      state.sheetOpen = false;
      render();
    });
  }
  const sheetBackdrop = document.getElementById("sheetBackdrop");
  if(sheetBackdrop){
    sheetBackdrop.addEventListener("click", ()=>{
      state.sheetOpen = false;
      render();
    });
  }

  const modalOverlay = document.getElementById("modalOverlay");
  if(modalOverlay){
    modalOverlay.addEventListener("click", (e)=>{
      if(e.target.id === "modalOverlay"){ state.modalItem = null; render(); }
    });
    document.getElementById("modalCloseBtn").addEventListener("click", ()=>{ state.modalItem = null; render(); });

    let modalQty = 1;
    const qtyVal = document.getElementById("modalQtyVal");
    const priceEl = document.getElementById("modalAddPrice");
    const found = findItem(state.modalItem);

    function recalcModalPrice(){
      let extra = 0;
      document.querySelectorAll("[data-extra]").forEach(cb=>{
        if(cb.checked){
          const ex = BURGER_EXTRAS.find(e=>e.id===cb.getAttribute("data-extra"));
          if(ex) extra += ex.price;
        }
      });
      const unit = found.price + extra;
      priceEl.textContent = formatCLP(unit * modalQty);
    }

    document.querySelectorAll("[data-extra]").forEach(cb=>{
      cb.addEventListener("change", recalcModalPrice);
    });

    document.getElementById("modalQtyInc").addEventListener("click", ()=>{
      modalQty++; qtyVal.textContent = modalQty; recalcModalPrice();
    });
    document.getElementById("modalQtyDec").addEventListener("click", ()=>{
      if(modalQty>1){ modalQty--; qtyVal.textContent = modalQty; recalcModalPrice(); }
    });

    document.getElementById("modalAddBtn").addEventListener("click", ()=>{
      let extra = 0;
      let extrasLabels = [];
      document.querySelectorAll("[data-extra]").forEach(cb=>{
        if(cb.checked){
          const ex = BURGER_EXTRAS.find(e=>e.id===cb.getAttribute("data-extra"));
          if(ex){ extra += ex.price; extrasLabels.push(ex.label); }
        }
      });
      const flavorSelect = document.getElementById("drinkFlavorSelect");
      if(flavorSelect){ extrasLabels.push("Sabor: " + flavorSelect.value); }

      state.cart.push({
        cartId: "line" + (cartIdCounter++),
        itemId: found.id,
        name: found.name,
        unitPrice: found.price + extra,
        qty: modalQty,
        extrasLabels: extrasLabels
      });
      state.modalItem = null;
      render();
    });
  }

  const newOrderBtn = document.getElementById("newOrderBtn");
  if(newOrderBtn){
    newOrderBtn.addEventListener("click", ()=>{
      state.statusTimers.forEach(t=>clearTimeout(t));
      state.statusTimers = [];
      if(state.realtimeChannel && sb){
        sb.removeChannel(state.realtimeChannel);
        state.realtimeChannel = null;
      }
      state.view = "menu";
      state.cart = [];
      state.orderNumber = null;
      state.orderId = null;
      state.statusStep = 0;
      state.orderType = "retiro";
      state.paymentMethod = null;
      state.deliveryAddress = "";
      render();
    });
  }
}

function findItem(itemId){
  for(const key in MENU){
    const f = MENU[key].items.find(i=>i.id===itemId);
    if(f) return f;
  }
  return null;
}

const STATUS_STEPS_RETIRO = ["recibido","preparando","listo"];
const STATUS_STEPS_DELIVERY = ["recibido","preparando","en_camino","entregado"];

function statusToStep(status, orderType){
  const list = orderType === "delivery" ? STATUS_STEPS_DELIVERY : STATUS_STEPS_RETIRO;
  const idx = list.indexOf(status);
  return idx === -1 ? 0 : idx;
}

async function confirmOrder(){
  if(!canConfirmOrder()) return;

  if(supabaseReady){
    const confirmBtn = document.getElementById("confirmBtn");
    if(confirmBtn){ confirmBtn.disabled = true; confirmBtn.textContent = "Enviando pedido…"; }

    const subtotal = cartSubtotal();
    const deliveryFee = cartDeliveryFee();
    const total = cartGrandTotal();
    const newOrderId = crypto.randomUUID();

    const { error: orderError } = await sb
      .from("orders")
      .insert({
        id: newOrderId,
        order_type: state.orderType,
        payment_method: state.paymentMethod,
        delivery_address: state.orderType === "delivery" ? state.deliveryAddress : null,
        subtotal, delivery_fee: deliveryFee, total,
        status: "recibido"
      });

    if(orderError){
      alert("No se pudo enviar el pedido. Intenta de nuevo.\n" + orderError.message);
      if(confirmBtn){ confirmBtn.disabled = false; confirmBtn.textContent = "Confirmar pedido"; }
      return;
    }

    const itemsPayload = state.cart.map(line => ({
      order_id: newOrderId,
      item_name: line.name,
      unit_price: line.unitPrice,
      qty: line.qty,
      extras: line.extrasLabels.join(" · ")
    }));
    const { error: itemsError } = await sb.from("order_items").insert(itemsPayload);
    if(itemsError){
      console.error("Error guardando items:", itemsError.message);
    }

    // El trigger en la base de datos ya creó la fila de seguimiento público;
    // la leemos para mostrar el número de pedido real.
    const { data: trackingRow, error: trackingError } = await sb
      .from("order_tracking")
      .select("order_number")
      .eq("id", newOrderId)
      .single();

    state.orderId = newOrderId;
    state.orderNumber = "N° " + (trackingRow ? trackingRow.order_number : "—");
    state.statusStep = 0;
    state.sheetOpen = false;
    state.view = "ticket";
    render();
    subscribeToOrder(newOrderId);

  } else {
    // MODO DEMO: sin Supabase configurado, se simula el avance de estados.
    state.orderId = null;
    state.orderNumber = "N° " + (100 + Math.floor(Math.random()*800));
    state.statusStep = 0;
    state.sheetOpen = false;
    state.view = "ticket";
    render();

    const isDelivery = state.orderType === "delivery";
    const t1 = setTimeout(()=>{ state.statusStep = 1; render(); }, 3000);
    const t2 = setTimeout(()=>{ state.statusStep = 2; render(); }, isDelivery ? 7000 : 8000);
    state.statusTimers = [t1, t2];
    if(isDelivery){
      const t3 = setTimeout(()=>{ state.statusStep = 3; render(); }, 13000);
      state.statusTimers.push(t3);
    }
  }
}

function subscribeToOrder(orderId){
  if(!sb) return;
  if(state.realtimeChannel){
    sb.removeChannel(state.realtimeChannel);
  }
  state.realtimeChannel = sb
    .channel("order-" + orderId)
    .on("postgres_changes",
      { event: "UPDATE", schema: "public", table: "order_tracking", filter: "id=eq." + orderId },
      (payload) => {
        state.statusStep = statusToStep(payload.new.status, state.orderType);
        render();
      }
    )
    .subscribe();
}

render();

if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{ /* modo offline no disponible, la app igual funciona online */ });
  });
}
</script>
